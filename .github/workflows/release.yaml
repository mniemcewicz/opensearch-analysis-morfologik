name: Publish utility on release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    steps:

      - name: '📄 Checkout'
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: 'Build and Run Tests'
        run: |
          ./gradlew build

      - name: 'Upload release'
        run: |
          gh release upload ${{ github.event.release.tag_name }} build/distributions/opensearch-analysis-morfologik-${{ github.event.release.tag_name }}.zip
        env:
          GITHUB_TOKEN: ${{ github.TOKEN }}
        shell: bash